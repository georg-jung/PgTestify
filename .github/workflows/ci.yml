name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read
    
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'
        
    - run: dotnet restore
      
    - name: 🛠️ Build
      run: dotnet build --no-restore -c Release
      
    # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
    - name: ⚙️ Expose GitHub Actions Runtime
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: 🧪 net8.0
      run: dotnet test -c Release --no-build -f net8.0

    - name: 🧪 net9.0 with coverage
      run: dotnet test -c Release --no-build -f net9.0 --coverage --coverage-output cobertura.xml --coverage-output-format cobertura
      
    - name: 📢 Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: 📦 Pack
      run: dotnet pack -c Release -o ./artifacts

    - name: 📢 NuGet artifacts
      id: upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nuget-package
        path: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg

    - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      if: github.ref_name == github.event.repository.default_branch || github.ref_type == 'tag'
      with:
        subject-path: |
          ./artifacts/**/*.nupkg
          ./artifacts/**/*.snupkg
